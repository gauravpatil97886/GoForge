<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GoForge — Learn Go Programming Free | Golang Tutorial, Interview Prep & DSA</title>
  <meta name="description" content="Free Go (Golang) learning platform: 50+ in-depth topics, 800+ coding questions, system design, DSA in Go, concurrency deep-dives, and CTC-wise interview prep for 10-30+ LPA roles at Google, Uber, Razorpay & more." />
  <meta name="keywords" content="golang tutorial, learn go programming, go interview questions, golang concurrency, goroutines, go channels, golang system design, DSA in go, golang interview prep, go programming course free, golang for backend, go developer roadmap" />
  <meta name="author" content="Gaurav Patil" />
  <meta name="robots" content="index, follow, max-image-preview:large" />
  <link rel="canonical" href="https://gauravpatil97886.github.io/GoForge/" />

  <!-- Open Graph -->
  <meta property="og:title" content="GoForge — Learn Go Programming Free | Tutorials, Interview Prep & DSA" />
  <meta property="og:description" content="50+ Go topics, 800+ coding questions, system design case studies, DSA in Go, and CTC-wise interview preparation. 100% free, no signup." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://gauravpatil97886.github.io/GoForge/" />
  <meta property="og:site_name" content="GoForge" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="GoForge — Learn Go Programming Free" />
  <meta name="twitter:description" content="50+ Go topics, 800+ coding questions, system design & CTC-wise interview prep. Free forever." />

  <!-- Structured Data: educational site + course -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "GoForge",
    "alternateName": "GoForge — Go Programming Learning Platform",
    "url": "https://gauravpatil97886.github.io/GoForge/",
    "description": "Free comprehensive Go (Golang) learning platform with tutorials, coding practice, system design, and interview preparation.",
    "author": { "@type": "Person", "name": "Gaurav Patil", "url": "https://github.com/gauravpatil97886" }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Course",
    "name": "GoForge: Complete Go Programming Course",
    "description": "Go programming from fundamentals to production: concurrency, system design, DSA in Go, and company-style interview preparation across 6 difficulty levels.",
    "provider": { "@type": "Person", "name": "Gaurav Patil", "url": "https://github.com/gauravpatil97886" },
    "isAccessibleForFree": true,
    "inLanguage": "en",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "hasCourseInstance": {
      "@type": "CourseInstance",
      "courseMode": "online",
      "courseWorkload": "PT90H"
    }
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- Highlight.js Dark Theme -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme" />

  <!-- App Styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- CDN Libraries (deferred for performance) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js" defer></script>
</head>

<body>
<div id="app">

  <!-- ═══════════════════ FIXED TOP HEADER ═══════════════════ -->
  <header id="header">
    <div class="header-left">
      <button id="menu-toggle" class="icon-btn" aria-label="Toggle sidebar" aria-expanded="false">
        <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
          <rect width="18" height="2" rx="1" fill="currentColor"/>
          <rect y="6" width="12" height="2" rx="1" fill="currentColor"/>
          <rect y="12" width="18" height="2" rx="1" fill="currentColor"/>
        </svg>
      </button>

      <a href="#" id="logo" onclick="showWelcome(); return false;" aria-label="GoForge Home">
        <!-- Two-hexagon SVG logo: goroutines connected by channels -->
        <svg class="logo-icon" width="36" height="32" viewBox="0 0 36 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- Left hexagon: filled Go-blue -->
          <polygon points="9,2 16,2 19.5,8 16,14 9,14 5.5,8" fill="#00ACD7"/>
          <!-- Connection channel line -->
          <line x1="19.5" y1="8" x2="16.5" y2="24" stroke="#00ACD7" stroke-width="1.5" stroke-dasharray="2,1.5" opacity="0.6"/>
          <!-- Right hexagon: outlined -->
          <polygon points="19,18 26,18 29.5,24 26,30 19,30 15.5,24" fill="none" stroke="#00ACD7" stroke-width="1.5"/>
          <!-- Channel dots -->
          <circle cx="19.5" cy="8" r="1.5" fill="#fff" opacity="0.9"/>
          <circle cx="16.5" cy="24" r="1.5" fill="#00ACD7" opacity="0.9"/>
        </svg>
        <span class="logo-text">GoForge</span>
      </a>
    </div>

    <div class="header-center">
      <button id="search-bar" class="search-bar-btn" onclick="openSearch()" aria-label="Search topics (Ctrl+K)">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <span class="search-placeholder">Search topics...</span>
        <kbd class="kbd-combo"><kbd class="kbd-key">Ctrl</kbd><kbd class="kbd-key">K</kbd></kbd>
      </button>
    </div>

    <div class="header-right">
      <div id="progress-pill" title="Overall learning progress">
        <span id="progress-text">0%</span>
        <div id="progress-bar-mini"><div id="progress-fill"></div></div>
      </div>
      <button id="theme-toggle" class="icon-btn" title="Toggle light/dark theme">
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <a href="https://github.com/gauravpatil97886" target="_blank" rel="noopener noreferrer" class="icon-btn header-gh-btn" title="Gaurav Patil — Creator of GoForge" aria-label="GitHub Profile">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- ═══════════════════ READING PROGRESS BAR ═══════════════════ -->
  <div id="reading-progress"><div id="reading-progress-fill"></div></div>

  <!-- ═══════════════════ MAIN LAYOUT ═══════════════════ -->
  <div id="layout">

    <!-- ═══════════════════ LEFT SIDEBAR ═══════════════════ -->
    <aside id="sidebar" aria-label="Course navigation">
      <div id="sidebar-inner">

        <!-- Sidebar Stats -->
        <div id="sidebar-stats">
          <div class="stat-item">
            <span class="stat-num" id="stat-topics">35+</span>
            <span class="stat-label">Topics</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-num" id="stat-questions">800+</span>
            <span class="stat-label">Questions</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-num" id="stat-done">0</span>
            <span class="stat-label">Done</span>
          </div>
        </div>

        <!-- Topic Filter -->
        <div id="sidebar-filter-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="sidebar-filter" placeholder="Filter topics…" autocomplete="off" spellcheck="false" />
          <button id="sidebar-filter-clear" aria-label="Clear filter" style="display:none">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <!-- Navigation Tree -->
        <nav id="nav-tree" role="tree" aria-label="Course navigation"></nav>

        <!-- Sidebar Footer -->
        <div id="sidebar-footer">
          <div id="sidebar-progress-row">
            <span id="sidebar-progress-label">Progress</span>
            <span id="sidebar-progress-text">0 / 0</span>
          </div>
          <div id="sidebar-progress-track">
            <div id="sidebar-progress-fill"></div>
          </div>
          <div id="sidebar-copyright">
            <a href="https://github.com/gauravpatil97886" target="_blank" rel="noopener noreferrer" style="color:var(--accent);text-decoration:none">© 2026 Gaurav Patil</a>
            <span class="footer-dot">·</span>
            <span>GoForge Platform</span>
          </div>
        </div>

      </div>
    </aside>

    <!-- ═══════════════════ CONTENT AREA ═══════════════════ -->
    <main id="content-area">

      <!-- Welcome Screen (shown by default) -->
      <div id="welcome"></div>

      <!-- Content: breadcrumb + meta + article + TOC -->
      <div id="content-wrapper" style="display:none">

        <!-- Breadcrumb -->
        <div id="breadcrumb" aria-label="Breadcrumb">
          <span id="breadcrumb-section"></span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="bc-arrow"><path d="m9 18 6-6-6-6"/></svg>
          <span id="breadcrumb-topic"></span>
        </div>

        <!-- Topic Meta Bar -->
        <div id="topic-meta">
          <span id="meta-time" class="meta-chip">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            5 min read
          </span>
          <span id="meta-level" class="meta-chip"></span>
          <button id="btn-mark-done" class="action-btn" onclick="toggleCurrentProgress()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            <span id="mark-done-text">Mark Complete</span>
          </button>
          <button id="btn-bookmark" class="action-btn" onclick="toggleBookmark()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            <span id="bookmark-text">Bookmark</span>
          </button>
          <button id="btn-print" class="action-btn" onclick="window.print()" title="Print this topic">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Print
          </button>
          <button class="action-btn" onclick="enterReadingMode()" title="Reading mode — hide all UI chrome">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            Read
          </button>
          <!-- Font size controls -->
          <div id="font-controls" title="Adjust text size">
            <button class="font-ctrl-btn" onclick="changeFontSize(-1)" title="Smaller text">A−</button>
            <span id="font-scale-label">100%</span>
            <button class="font-ctrl-btn" onclick="changeFontSize(1)" title="Larger text">A+</button>
          </div>
        </div>

        <!-- Layout: article + TOC -->
        <div id="content-layout">
          <!-- Main Article -->
          <article id="content" aria-live="polite">
            <div id="markdown-body"></div>
            <div id="content-footer-nav">
              <button id="prev-btn" class="footer-nav-btn" style="visibility:hidden">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
                <span id="prev-title">Previous</span>
              </button>
              <button id="next-btn" class="footer-nav-btn next" style="visibility:hidden">
                <span id="next-title">Next</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
              </button>
            </div>
          </article>

          <!-- Table of Contents -->
          <aside id="toc" hidden aria-label="Table of contents">
            <div id="toc-title">On this page</div>
            <nav id="toc-nav"></nav>
          </aside>
        </div>

      </div>

      <!-- Loading State -->
      <div id="loading" style="display:none" role="status" aria-label="Loading">
        <div class="loading-inner">
          <div class="loading-hex">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <polygon points="24,4 40,13 40,35 24,44 8,35 8,13" stroke="#00ACD7" stroke-width="1.5" fill="none" class="hex-spin-outline"/>
              <polygon points="24,12 34,17.5 34,30.5 24,36 14,30.5 14,17.5" fill="#00ACD715" stroke="#00ACD740" stroke-width="1"/>
            </svg>
          </div>
          <p class="loading-text">Forging content…</p>
        </div>
      </div>

      <!-- Error State -->
      <div id="error-state" style="display:none" role="alert">
        <div class="error-inner">
          <div class="error-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <h2>Content Not Found</h2>
          <p id="error-message">This topic hasn't been created yet — check back soon.</p>
          <button class="btn-primary" onclick="showWelcome()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
            Back to Home
          </button>
        </div>
      </div>

    </main>

  </div>
  <!-- /layout -->

  <!-- ═══════════════════ SEARCH MODAL ═══════════════════ -->
  <div id="search-overlay" hidden onclick="closeSearch()"></div>
  <div id="search-modal" hidden role="dialog" aria-modal="true" aria-label="Search topics">
    <div id="search-header">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" class="search-icon-lg">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search-input" type="text"
        placeholder="Search Go topics, patterns, concepts..."
        autocomplete="off" spellcheck="false" />
      <kbd id="search-esc" onclick="closeSearch()" title="Close search">ESC</kbd>
    </div>
    <div id="search-results" role="listbox"></div>
    <div id="search-footer">
      <span class="search-hint"><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
      <span class="search-hint"><kbd>↵</kbd> open</span>
      <span class="search-hint"><kbd>ESC</kbd> close</span>
    </div>
  </div>

  <!-- ═══════════════════ SIDEBAR OVERLAY (mobile) ═══════════════════ -->
  <div id="sidebar-overlay" onclick="closeSidebar()" aria-hidden="true"></div>

  <!-- ═══════════════════ STATS MODAL ═══════════════════ -->
  <div id="stats-modal" style="display:none" role="dialog" aria-modal="true" aria-label="Your Stats">
    <div class="modal-backdrop" onclick="closeStatsModal()"></div>
    <div class="modal-panel">
      <div class="modal-head">
        <h2 class="modal-title">Your Progress</h2>
        <button class="icon-btn" onclick="closeStatsModal()" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="stats-body" class="modal-body"></div>
    </div>
  </div>

</div>
<!-- /#app -->

<!-- ═══════════════════ MOBILE BOTTOM NAV ═══════════════════ -->
<nav id="mobile-nav" aria-label="Mobile navigation">
  <button class="mob-btn" onclick="showWelcome()" aria-label="Home">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </button>
  <button class="mob-btn" onclick="openSearch()" aria-label="Search">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <span>Search</span>
  </button>
  <button class="mob-btn" onclick="openMobTOC()" id="mob-toc-btn" aria-label="Contents">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="14" y2="12"/><line x1="3" y1="18" x2="17" y2="18"/></svg>
    <span>Contents</span>
  </button>
  <button class="mob-btn" onclick="toggleSidebar()" aria-label="Topics">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span>Topics</span>
  </button>
  <button class="mob-btn" onclick="showStats()" aria-label="Stats">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span>Progress</span>
  </button>
</nav>

<!-- ═══════════════════ MOBILE TOC SHEET ═══════════════════ -->
<div id="mob-toc-overlay" onclick="closeMobTOC()"></div>
<div id="mob-toc-panel" role="dialog" aria-label="Table of contents">
  <div class="mob-toc-handle"></div>
  <div class="mob-toc-header">
    <span class="mob-toc-title">On This Page</span>
    <button class="icon-btn" onclick="closeMobTOC()" aria-label="Close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <nav id="mob-toc-nav"></nav>
</div>

<!-- ═══════════════════ READING MODE EXIT ═══════════════════ -->
<button id="reading-mode-exit" onclick="exitReadingMode()" title="Exit reading mode">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
  Exit Reading Mode
</button>

<!-- ═══════════════════ SWIPE HINT ═══════════════════ -->
<div id="swipe-hint" aria-hidden="true"></div>

<script src="script.js"></script>
</body>
</html>
